name: Quality Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "codex/**"

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run project checks
        shell: pwsh
        run: ./scripts/checks.ps1