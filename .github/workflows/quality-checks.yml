name: Primary CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

jobs:
  primary_checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run primary checks
        shell: pwsh
        run: ./scripts/primary-checks.ps1
